<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Hotel Gavkari</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="extra.css">
</head>
<body>
  <header>
    <div class="logo">☕ Hotel Gavkari</div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="admin-login.html">Admin</a></li>
              <li><button class="theme-toggle">🌙</button></li>
      </ul>
    </nav>
  </header>

  <section class="page-section login-section">
    <div class="login-card">
      <h2>🔒 Admin Login</h2>
      <p class="hint">Enter admin credentials to view orders</p>
      <form id="login-form">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="pay-btn">Login</button>
      </form>
      <p id="login-error" class="error-msg"></p>
    </div>
  </section>

  <footer><p>&copy; 2025 Hotel Gavkari. All rights reserved.</p></footer>

  <script src="admin.js"></script>
  <script src="theme.js"></script>
</body>
</html>
