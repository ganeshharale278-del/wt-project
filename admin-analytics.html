<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - Hotel Gavkari Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="extra.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <div class="logo">☕ Hotel Gavkari — Analytics</div>
    <nav>
      <ul>
        <li><a href="admin-dashboard.html">← Dashboard</a></li>
        <li><a href="index.html">Site</a></li>
        <li><button class="theme-toggle">🌙</button></li>
        <li><a href="#" id="logout-btn">Logout</a></li>
      </ul>
    </nav>
  </header>

  <section class="page-section">
    <h2>📊 Sales Analytics</h2>

    <div class="stats-row">
      <div class="stat-card"><h4>Total Revenue</h4><p id="ana-revenue">₹0</p></div>
      <div class="stat-card"><h4>Total Orders</h4><p id="ana-orders">0</p></div>
      <div class="stat-card"><h4>Avg Order Value</h4><p id="ana-avg">₹0</p></div>
      <div class="stat-card"><h4>Delivered</h4><p id="ana-delivered">0</p></div>
    </div>

    <div class="analytics-grid">

      <div class="analytics-card" style="grid-column: span 2;">
        <h3>📈 Daily Revenue (Last 7 Days)</h3>
        <div style="position:relative; height:240px;">
          <canvas id="chart-revenue"></canvas>
        </div>
      </div>

      <div class="analytics-card">
        <h3>🍽️ Orders by Status</h3>
        <div style="position:relative; height:240px;">
          <canvas id="chart-status"></canvas>
        </div>
      </div>

      <div class="analytics-card">
        <h3>💳 Payment Methods</h3>
        <div style="position:relative; height:240px;">
          <canvas id="chart-payment"></canvas>
        </div>
      </div>

      <div class="analytics-card" style="grid-column: span 2;">
        <h3>🏆 Top 5 Ordered Items</h3>
        <div style="position:relative; height:220px;">
          <canvas id="chart-items"></canvas>
        </div>
      </div>

    </div>
  </section>

  <footer><p>&copy; 2025 Hotel Gavkari. All rights reserved.</p></footer>

  <script src="theme.js"></script>
  <script>
    const API = 'http://localhost:3000';

    function inr(n) { return '₹' + parseInt(n, 10).toLocaleString('en-IN'); }
    function isLoggedIn() { return sessionStorage.getItem('admin_logged_in') === 'yes'; }

    if (!isLoggedIn()) window.location.href = 'admin-login.html';

    document.getElementById('logout-btn').onclick = e => {
      e.preventDefault();
      sessionStorage.removeItem('admin_logged_in');
      window.location.href = 'admin-login.html';
    };

    const chartDefaults = {
      plugins: { legend: { labels: { color: '#555', font: { size: 12 } } } },
      scales: { x: { ticks: { color: '#555' }, grid: { color: '#eee' } }, y: { ticks: { color: '#555' }, grid: { color: '#eee' } } }
    };
    const COLORS = ['#6c5ce7','#fd79a8','#00b894','#fdcb6e','#0984e3','#e17055'];

    async function loadAnalytics() {
      let orders = [];
      try {
        const res = await fetch(API + '/api/orders');
        orders = await res.json();
      } catch(e) {
        document.querySelector('.analytics-grid').innerHTML =
          '<p style="text-align:center;color:#d63031;padding:2rem;">Failed to load data. Is the server running?</p>';
        return;
      }

      // Summary stats
      const revenue = orders.reduce((s, o) => s + parseFloat(o.total || 0), 0);
      document.getElementById('ana-revenue').textContent = inr(revenue);
      document.getElementById('ana-orders').textContent = orders.length;
      document.getElementById('ana-avg').textContent = orders.length ? inr(revenue / orders.length) : '₹0';
      document.getElementById('ana-delivered').textContent = orders.filter(o => o.status === 'Delivered').length;

      // Chart 1: Daily revenue last 7 days
      const days = {};
      for (let i = 6; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        days[d.toISOString().slice(0,10)] = 0;
      }
      orders.forEach(o => {
        const day = (o.created_at || '').slice(0,10);
        if (days[day] !== undefined) days[day] += parseFloat(o.total || 0);
      });
      new Chart(document.getElementById('chart-revenue'), {
        type: 'line',
        data: {
          labels: Object.keys(days).map(d => { const [,m,dd] = d.split('-'); return dd+'/'+m; }),
          datasets: [{ label: 'Revenue (₹)', data: Object.values(days), borderColor: '#6c5ce7', backgroundColor: 'rgba(108,92,231,0.1)', tension: 0.4, fill: true, pointRadius: 5 }]
        },
        options: { responsive: true, maintainAspectRatio: false, ...chartDefaults }
      });

      // Chart 2: Orders by status (doughnut)
      const statusCount = {};
      orders.forEach(o => { statusCount[o.status] = (statusCount[o.status] || 0) + 1; });
      new Chart(document.getElementById('chart-status'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(statusCount),
          datasets: [{ data: Object.values(statusCount), backgroundColor: COLORS }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#555' } } } }
      });

      // Chart 3: Payment methods (pie)
      const payCount = {};
      orders.forEach(o => { const p = o.payment_method || 'Unknown'; payCount[p] = (payCount[p] || 0) + 1; });
      new Chart(document.getElementById('chart-payment'), {
        type: 'pie',
        data: {
          labels: Object.keys(payCount),
          datasets: [{ data: Object.values(payCount), backgroundColor: COLORS.slice(2) }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#555' } } } }
      });

      // Chart 4: Top 5 items (bar)
      const itemCount = {};
      orders.forEach(o => {
        let items = [];
        try { items = typeof o.items === 'string' ? JSON.parse(o.items) : (o.items || []); } catch(_){}
        items.forEach(it => {
          const name = it.name || ('Dish #' + it.dishId);
          itemCount[name] = (itemCount[name] || 0) + (it.quantity || 1);
        });
      });
      const sorted = Object.entries(itemCount).sort((a,b) => b[1]-a[1]).slice(0,5);
      new Chart(document.getElementById('chart-items'), {
        type: 'bar',
        data: {
          labels: sorted.map(e => e[0]),
          datasets: [{ label: 'Times Ordered', data: sorted.map(e => e[1]), backgroundColor: COLORS }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, ...chartDefaults }
      });
    }

    loadAnalytics();
  </script>
</body>
</html>
